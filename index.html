<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
        />
        <script src="webxdc.js"></script>
        <title>Strudel</title>
        <style>
            :root {
                --background: #222;
                --foreground: #fff;
                --toolbar-bg: rgba(30, 30, 30, 0.92);
                --toolbar-border: #444;
                --btn-hover: #3a3a3a;
                --btn-active: #4a9;
                --error-bg: rgba(180, 30, 30, 0.9);
                --panel-bg: #1a1a1a;
                --panel-border: #444;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background: var(--background);
                color: var(--foreground);
                font-family: monospace;
                overflow: hidden;
            }

            #editor-root {
                position: fixed;
                inset: 0;
                bottom: 44px;
                overflow: auto;
            }

            #editor-root .cm-editor {
                height: 100%;
                background: transparent;
            }

            #editor-root .cm-scroller {
                overflow: auto;
                padding-bottom: 8px;
            }

            /* Toolbar */
            #toolbar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 44px;
                display: flex;
                align-items: center;
                gap: 2px;
                padding: 0 8px;
                background: var(--toolbar-bg);
                border-top: 1px solid var(--toolbar-border);
                z-index: 100;
            }

            #toolbar button {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 36px;
                height: 32px;
                padding: 0;
                background: transparent;
                border: 1px solid transparent;
                border-radius: 4px;
                color: var(--foreground);
                cursor: pointer;
                font-size: 16px;
                transition:
                    background 0.15s,
                    border-color 0.15s;
            }

            #toolbar button:hover {
                background: var(--btn-hover);
                border-color: var(--toolbar-border);
            }

            #toolbar button:active {
                background: #555;
            }

            #play-btn.playing {
                color: #4db870;
            }

            #toolbar .spacer {
                flex: 1;
            }

            #toolbar .status {
                font-size: 12px;
                color: #888;
                margin-right: 6px;
                max-width: 200px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            #toolbar .status.error {
                color: #e55;
            }

            /* Settings panel (slides up from toolbar) */
            #settings-panel {
                position: fixed;
                bottom: 44px;
                right: 0;
                width: 280px;
                background: var(--panel-bg);
                border: 1px solid var(--panel-border);
                border-bottom: none;
                border-radius: 6px 0 0 0;
                padding: 12px 16px;
                z-index: 99;
                display: none;
                flex-direction: column;
                gap: 10px;
            }

            #settings-panel.open {
                display: flex;
            }

            #settings-panel h3 {
                margin: 0 0 4px;
                font-size: 13px;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: #aaa;
            }

            .setting-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 14px;
                gap: 8px;
            }

            .setting-row label {
                flex: 1;
                cursor: pointer;
            }

            .setting-row input[type='range'] {
                width: 100px;
            }

            .setting-row input[type='checkbox'] {
                cursor: pointer;
                width: 16px;
                height: 16px;
            }

            .setting-row select {
                background: #333;
                color: var(--foreground);
                border: 1px solid var(--toolbar-border);
                border-radius: 3px;
                padding: 2px 4px;
                font-size: 13px;
            }

            /* Shared-code notification */
            #shared-notice {
                position: fixed;
                top: 12px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(40, 100, 60, 0.92);
                color: #fff;
                font-size: 13px;
                padding: 6px 14px;
                border-radius: 20px;
                z-index: 200;
                display: none;
                pointer-events: none;
            }

            #shared-notice.show {
                display: block;
            }
        </style>
    </head>
    <body>
        <div id="editor-root"></div>

        <div id="toolbar">
            <button id="play-btn" title="Play / Evaluate (Ctrl+Enter)">
                <svg
                    width="16"
                    height="16"
                    viewBox="0 0 16 16"
                    fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <polygon id="play-icon" points="3,1 13,8 3,15" />
                    <g id="pause-icon" style="display: none">
                        <rect x="2" y="1" width="4" height="14" />
                        <rect x="10" y="1" width="4" height="14" />
                    </g>
                </svg>
            </button>
            <button id="stop-btn" title="Stop (Ctrl+.)">
                <svg
                    width="14"
                    height="14"
                    viewBox="0 0 14 14"
                    fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <rect x="1" y="1" width="12" height="12" />
                </svg>
            </button>
            <div class="spacer"></div>
            <span id="status-text" class="status"></span>
            <button id="share-btn" title="Share current pattern">
                <svg
                    width="16"
                    height="16"
                    viewBox="0 0 16 16"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <circle cx="12" cy="3" r="2" />
                    <circle cx="4" cy="8" r="2" />
                    <circle cx="12" cy="13" r="2" />
                    <line x1="10.3" y1="4" x2="5.7" y2="7" />
                    <line x1="10.3" y1="12" x2="5.7" y2="9" />
                </svg>
            </button>
            <button id="settings-btn" title="Settings">
                <svg
                    width="16"
                    height="16"
                    viewBox="0 0 16 16"
                    fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                        d="M8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm5.65-1.35-.9-.52a5 5 0 0 0 0-1.26l.9-.52a.5.5 0 0 0 .18-.68l-1-1.73a.5.5 0 0 0-.68-.18l-.9.52a5.1 5.1 0 0 0-1.09-.63V3.5a.5.5 0 0 0-.5-.5h-2a.5.5 0 0 0-.5.5v1.04a5.1 5.1 0 0 0-1.09.63l-.9-.52a.5.5 0 0 0-.68.18l-1 1.73a.5.5 0 0 0 .18.68l.9.52a5 5 0 0 0 0 1.26l-.9.52a.5.5 0 0 0-.18.68l1 1.73c.14.24.44.32.68.18l.9-.52a5.1 5.1 0 0 0 1.09.63v1.04c0 .28.22.5.5.5h2a.5.5 0 0 0 .5-.5v-1.04a5.1 5.1 0 0 0 1.09-.63l.9.52c.24.14.54.06.68-.18l1-1.73a.5.5 0 0 0-.18-.68z"
                    />
                </svg>
            </button>
        </div>

        <div id="settings-panel">
            <h3>Settings</h3>
            <div class="setting-row">
                <label for="font-size-input">Font size</label>
                <input
                    type="range"
                    id="font-size-input"
                    min="10"
                    max="32"
                    step="1"
                    value="18"
                />
                <span id="font-size-label">18</span>
            </div>
            <div class="setting-row">
                <label for="font-family-input">Font</label>
                <select id="font-family-input">
                    <option value="monospace">monospace</option>
                    <option value="'Courier New', monospace">
                        Courier New
                    </option>
                    <option value="'JetBrains Mono', monospace">
                        JetBrains Mono
                    </option>
                    <option value="'Fira Code', monospace">Fira Code</option>
                </select>
            </div>
            <div class="setting-row">
                <label for="line-numbers-input">Line numbers</label>
                <input type="checkbox" id="line-numbers-input" checked />
            </div>
            <div class="setting-row">
                <label for="line-wrap-input">Line wrapping</label>
                <input type="checkbox" id="line-wrap-input" />
            </div>
            <div class="setting-row">
                <label for="autocomplete-input">Autocomplete</label>
                <input type="checkbox" id="autocomplete-input" />
            </div>
            <div class="setting-row">
                <label for="bracket-matching-input">Bracket matching</label>
                <input type="checkbox" id="bracket-matching-input" />
            </div>
            <div class="setting-row">
                <label for="flash-input">Flash on eval</label>
                <input type="checkbox" id="flash-input" checked />
            </div>
            <div class="setting-row">
                <label for="pattern-highlight-input"
                    >Pattern highlighting</label
                >
                <input type="checkbox" id="pattern-highlight-input" checked />
            </div>
        </div>

        <div id="shared-notice">Pattern received — press ▶ to play</div>

        <script type="module" src="src/index.js"></script>
    </body>
</html>
