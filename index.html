<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
        />
        <script src="webxdc.js"></script>
        <title>Strudel</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                height: 100%;
                background: #000;
                color: #fff;
                font-family: monospace;
                display: flex;
                flex-direction: column;
            }
            #strudel-toolbar {
                display: flex;
                gap: 8px;
                padding: 6px 8px;
                background: #111;
                border-bottom: 1px solid #333;
                flex-shrink: 0;
            }
            #strudel-toolbar button {
                cursor: pointer;
                background: #222;
                color: #fff;
                border: 1px solid #555;
                border-radius: 4px;
                padding: 4px 12px;
                font-family: monospace;
                font-size: 14px;
            }
            #strudel-toolbar button:hover:not(:disabled) {
                background: #444;
            }
            #strudel-toolbar button:disabled {
                opacity: 0.4;
                cursor: default;
            }
            /* The strudel-editor web component inserts a sibling div that
               contains the actual CodeMirror editor. Make both fill the
               remaining height. */
            strudel-editor,
            strudel-editor + div {
                flex: 1;
                min-height: 0;
                overflow: auto;
            }
            strudel-editor + div .cm-editor {
                height: 100%;
            }
        </style>
    </head>
    <body>
        <strudel-editor>
            <!--
setcps(1)
n("<0 1 2 3 4>*8").scale('G4 minor')
.s("gm_lead_6_voice")
.clip(sine.range(.2,.8).slow(8))
.jux(rev)
.room(2)
.sometimes(add(note("12")))
.lpf(perlin.range(200,20000).slow(4))
            -->
        </strudel-editor>
        <script type="module" src="src/index.js"></script>
    </body>
</html>
