<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
        />
        <script src="webxdc.js"></script>
        <title>Strudel</title>
        <style>
            :root {
                --background: #222;
                --foreground: #fff;
                --toolbar-bg: rgba(30, 30, 30, 0.92);
                --toolbar-border: #444;
                --btn-hover: #3a3a3a;
                --btn-active: #4a9;
                --error-bg: rgba(180, 30, 30, 0.9);
                --panel-bg: #1a1a1a;
                --panel-border: #444;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background: var(--background);
                color: var(--foreground);
                font-family: monospace;
                overflow: hidden;
            }

            #editor-root {
                position: fixed;
                inset: 0;
                top: 44px;
                overflow: auto;
            }

            #editor-root .cm-editor {
                height: 100%;
                background: transparent;
            }

            #editor-root .cm-scroller {
                overflow: auto;
                padding-bottom: 8px;
            }

            /* Toolbar */
            #toolbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 44px;
                display: flex;
                align-items: center;
                gap: 2px;
                padding: 0 8px;
                background: var(--toolbar-bg);
                border-bottom: 1px solid var(--toolbar-border);
                z-index: 100;
            }

            #toolbar button {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 38px;
                height: 34px;
                padding: 0;
                background: transparent;
                border: 1px solid transparent;
                border-radius: 6px;
                color: var(--foreground);
                cursor: pointer;
                transition:
                    background 0.15s,
                    border-color 0.15s,
                    color 0.15s;
            }

            #toolbar button:hover {
                background: var(--btn-hover);
                border-color: var(--toolbar-border);
            }

            #toolbar button:active {
                background: #555;
            }

            #toolbar button:disabled {
                opacity: 0.25;
                cursor: default;
            }

            #toolbar button:disabled:hover {
                background: transparent;
                border-color: transparent;
            }

            #play-btn.playing {
                color: #4db870;
            }

            #toolbar .spacer {
                flex: 1;
            }

            #toolbar .status {
                font-size: 12px;
                color: #888;
                margin-right: 6px;
                max-width: 200px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            #toolbar .status.error {
                color: #e55;
            }

            /* Settings panel (slides down from toolbar) */
            #settings-panel {
                position: fixed;
                top: 44px;
                right: 0;
                width: 280px;
                background: var(--panel-bg);
                border: 1px solid var(--panel-border);
                border-top: none;
                border-radius: 0 0 0 6px;
                padding: 12px 16px;
                z-index: 99;
                display: none;
                flex-direction: column;
                gap: 10px;
            }

            #settings-panel.open {
                display: flex;
            }

            #settings-panel h3 {
                margin: 0 0 4px;
                font-size: 13px;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: #aaa;
            }

            .setting-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 14px;
                gap: 8px;
            }

            .setting-row label {
                flex: 1;
                cursor: pointer;
            }

            .setting-row input[type='range'] {
                width: 100px;
            }

            .setting-row input[type='checkbox'] {
                cursor: pointer;
                width: 16px;
                height: 16px;
            }

            .setting-row select {
                background: #333;
                color: var(--foreground);
                border: 1px solid var(--toolbar-border);
                border-radius: 3px;
                padding: 2px 4px;
                font-size: 13px;
            }

            /* Shared-code notification */
            #shared-notice {
                position: fixed;
                top: 56px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(40, 100, 60, 0.92);
                color: #fff;
                font-size: 13px;
                padding: 6px 14px;
                border-radius: 20px;
                z-index: 200;
                display: none;
                pointer-events: none;
            }

            #shared-notice.show {
                display: block;
            }
        </style>
    </head>
    <body>
        <div id="editor-root"></div>

        <div id="toolbar">
            <button id="play-btn" title="Play / Stop (Ctrl+Enter)">
                <svg
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <polygon
                        id="play-icon"
                        points="6,3 20,12 6,21"
                        fill="currentColor"
                        stroke="currentColor"
                    />
                    <rect
                        id="stop-icon"
                        x="4"
                        y="4"
                        width="16"
                        height="16"
                        rx="2"
                        fill="currentColor"
                        stroke="currentColor"
                        style="display: none"
                    />
                </svg>
            </button>
            <button
                id="update-btn"
                title="Update (apply editor changes)"
                disabled
            >
                <svg
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                    <polyline points="17 21 17 13 7 13 7 21" />
                    <polyline points="7 3 7 8 15 8" />
                </svg>
            </button>
            <div class="spacer"></div>
            <span id="status-text" class="status"></span>
            <button id="settings-btn" title="Settings">
                <svg
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                    />
                </svg>
            </button>
        </div>

        <div id="settings-panel">
            <h3>Settings</h3>
            <div class="setting-row">
                <label for="font-size-input">Font size</label>
                <input
                    type="range"
                    id="font-size-input"
                    min="10"
                    max="32"
                    step="1"
                    value="18"
                />
                <span id="font-size-label">18</span>
            </div>
            <div class="setting-row">
                <label for="font-family-input">Font</label>
                <select id="font-family-input">
                    <option value="monospace">monospace</option>
                    <option value="'Courier New', monospace">
                        Courier New
                    </option>
                    <option value="'JetBrains Mono', monospace">
                        JetBrains Mono
                    </option>
                    <option value="'Fira Code', monospace">Fira Code</option>
                </select>
            </div>
            <div class="setting-row">
                <label for="line-numbers-input">Line numbers</label>
                <input type="checkbox" id="line-numbers-input" checked />
            </div>
            <div class="setting-row">
                <label for="line-wrap-input">Line wrapping</label>
                <input type="checkbox" id="line-wrap-input" />
            </div>
            <div class="setting-row">
                <label for="autocomplete-input">Autocomplete</label>
                <input type="checkbox" id="autocomplete-input" />
            </div>
            <div class="setting-row">
                <label for="bracket-matching-input">Bracket matching</label>
                <input type="checkbox" id="bracket-matching-input" />
            </div>
            <div class="setting-row">
                <label for="flash-input">Flash on eval</label>
                <input type="checkbox" id="flash-input" checked />
            </div>
            <div class="setting-row">
                <label for="pattern-highlight-input"
                    >Pattern highlighting</label
                >
                <input type="checkbox" id="pattern-highlight-input" checked />
            </div>
        </div>

        <div id="shared-notice">Pattern received — press ▶ to play</div>

        <script type="module" src="src/index.js"></script>
    </body>
</html>
